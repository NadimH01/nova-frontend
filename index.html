<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova — AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --surface2:  #1c1c28;
      --border:    #2a2a3d;
      --accent:    #7c6af7;
      --accent2:   #f76a8a;
      --text:      #e8e8f0;
      --muted:     #6b6b88;
      --user-bg:   #1f1a3d;
      --bot-bg:    #161622;
      --radius:    14px;
      --font-main: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Ambient background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -150px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -100px; right: -80px;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
    }
    .header-text p {
      font-size: 12px; color: var(--muted);
      font-family: var(--font-mono);
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    .model-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(124,106,247,0.12);
      border: 1px solid rgba(124,106,247,0.25);
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative; z-index: 1;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 4px;
    }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 16px;
      padding: 40px 20px;
      animation: fadeUp 0.6s ease;
    }
    .welcome-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px;
      display: grid; place-items: center;
      font-size: 28px;
      margin-bottom: 4px;
    }
    .welcome h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .welcome p  { color: var(--muted); font-size: 15px; max-width: 320px; line-height: 1.6; }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-family: var(--font-main);
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124,106,247,0.08);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease;
      max-width: 760px;
      width: 100%;
    }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.bot  { align-self: flex-start; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message.bot  .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .message.user .avatar { background: var(--surface2); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.65;
      max-width: calc(100% - 50px);
    }
    .message.bot  .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(124,106,247,0.3);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .input-area {
      position: relative; z-index: 10;
      padding: 16px 20px 20px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-main);
      font-size: 15px;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #5b4de0);
      color: #fff;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    #send-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(124,106,247,0.4);
    }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 18px; height: 18px; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      font-family: var(--font-mono);
    }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      #messages { padding: 16px 14px; }
      .input-area { padding: 12px 14px 16px; }
      .welcome h2 { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <div class="header-text">
    <h1>Nova</h1>
    <p>Powered by Groq</p>
  </div>
  <div class="model-badge">llama-3.3-70b</div>
  <div class="status-dot"></div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>Hi, I'm Nova</h2>
    <p>Your AI assistant running on Groq's ultra-fast inference. Ask me anything.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="suggest(this)">✍️ Write a cold email</button>
      <button class="suggestion-btn" onclick="suggest(this)">💡 Explain quantum computing</button>
      <button class="suggestion-btn" onclick="suggest(this)">🐛 Debug my code</button>
      <button class="suggestion-btn" onclick="suggest(this)">📋 Summarise a document</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="user-input"
      placeholder="Message Nova…"
      rows="1"
      autocomplete="off"
    ></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="input-hint">Enter to send · Shift+Enter for new line</p>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const BACKEND_URL  = "https://novaai-4z1h.onrender.com/chat";
  const SYSTEM_PROMPT = `You are Aria, a customer support assistant for TechNova Sdn Bhd, a Malaysian software company.

You ONLY answer questions related to TechNova's products and services.
If a question is unrelated, politely say you can only help with TechNova-related questions.

== COMPANY INFO ==
Name: TechNova Sdn Bhd
Website: www.technova.com.my
Email: support@technova.com.my
Phone: +60 3-1234 5678
Hours: Mon–Fri, 9am–6pm MYT

== FAQS ==

Q: What services do you offer?
A: We offer custom web development, mobile apps, and IT consulting.

Q: How much does a website cost?
A: Basic websites start from RM 2,000. E-commerce from RM 5,000. Contact us for a quote.

Q: How long does a project take?
A: Simple websites take 2–3 weeks. Complex projects take 1–3 months.

Q: Do you offer support after launch?
A: Yes, we offer monthly maintenance packages starting from RM 200/month.

Q: How do I get started?
A: Fill in our contact form at www.technova.com.my/contact or WhatsApp us at +60 12-345 6789.

== RULES ==
- Always be polite and professional
- If unsure, say "I'm not sure about that — please contact us at support@technova.com.my"
- Never make up prices or promises
- Keep answers short and clear
- Respond in the same language the user writes in (Malay or English)`;
  // ────────────────────────────────────────────────────────────

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const welcomeEl  = document.getElementById('welcome');

  let history = [{ role: 'system', content: SYSTEM_PROMPT }];
  let isLoading = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Enter to send
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function suggest(btn) {
    const text = btn.textContent.replace(/^.{2}/, '').trim();
    inputEl.value = text;
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  }

  function addMessage(role, content) {
    if (welcomeEl) welcomeEl.remove();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? '✦' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message bot';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="typing-indicator">
      <span></span><span></span><span></span>
    </div>`;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const typingEl = addTyping();

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      typingEl.remove();

      if (data.error) {
        addMessage('bot', `⚠️ Error: ${data.error}`);
      } else {
        addMessage('bot', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      }

    } catch (err) {
      typingEl.remove();
      addMessage('bot', '⚠️ Could not reach the backend. Make sure it\'s running on port 3001.');
      console.error(err);
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
